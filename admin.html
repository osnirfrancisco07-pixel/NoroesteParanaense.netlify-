<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Noroeste Paranaense</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .admin-container { max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--azul); }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        .btn-salvar { background: var(--azul); color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-salvar:hover { background: #001a33; }
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: 1px solid var(--azul); border-radius: 5px; background: white; color: var(--azul); }
        .tab-btn.active { background: var(--azul); color: white; }
    </style>
</head>
<body style="background: #eef2f5;">

    <header>
        <div class="header-container">
            <h1>PAINEL <span>ADMINISTRATIVO</span></h1>
            <a href="index.html" style="color: white; text-decoration: none;"><i data-lucide="home"></i> Ver Site</a>
        </div>
    </header>

    <main class="admin-container">
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="showTab('noticia')">Nova Notícia</button>
            <button class="tab-btn" onclick="showTab('publicidade')">Gerenciar Banners</button>
        </div>

        <div id="tab-noticia">
            <h2 style="color: var(--azul); margin-bottom: 20px;">Publicar Notícia Local</h2>
            <form id="formNoticia">
                <div class="form-group">
                    <label>Título da Matéria</label>
                    <input type="text" id="post-titulo" placeholder="Ex: Nova obra inaugurada em Maringá" required>
                </div>
                <div class="form-group">
                    <label>Categoria</label>
                    <select id="post-categoria">
                        <option>Notícias</option>
                        <option>Economia</option>
                        <option>Esporte</option>
                        <option>Eventos</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Link da Imagem (URL)</label>
                    <input type="text" id="post-img" placeholder="https://linkdafoto.com/imagem.jpg">
                </div>
                <div class="form-group">
                    <label>Conteúdo da Notícia</label>
                    <textarea id="post-conteudo" rows="6" placeholder="Escreva aqui o texto da matéria..."></textarea>
                </div>
                <button type="submit" class="btn-salvar">PUBLICAR NO PORTAL</button>
            </form>
        </div>

        <div id="tab-publicidade" style="display: none;">
            <h2 style="color: var(--azul); margin-bottom: 20px;">Atualizar Banners</h2>
            <form id="formAd">
                <div class="form-group">
                    <label>Selecione a Aba de Anúncio</label>
                    <select id="ad-local">
                        <option value="ad-topo">Banner Topo (970x90)</option>
                        <option value="ad-meio">Banner Meio (728x90)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>URL da Imagem do Anúncio</label>
                    <input type="text" id="ad-img-url" placeholder="https://site.com/anuncio.jpg">
                </div>
                <button type="submit" class="btn-salvar">ATUALIZAR PUBLICIDADE</button>
            </form>
        </div>
    </main>

    <script>
        lucide.createIcons();

        function showTab(tab) {
            document.getElementById('tab-noticia').style.display = tab === 'noticia' ? 'block' : 'none';
            document.getElementById('tab-publicidade').style.display = tab === 'publicidade' ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        // Lógica para Salvar Notícia
        document.getElementById('formNoticia').addEventListener('submit', function(e) {
            e.preventDefault();
            const news = JSON.parse(localStorage.getItem('noticias_locais') || '[]');
            const newPost = {
                titulo: document.getElementById('post-titulo').value,
                categoria: document.getElementById('post-categoria').value,
                imagem: document.getElementById('post-img').value || 'https://via.placeholder.com/400',
                conteudo: document.getElementById('post-conteudo').value,
                data: new Date().toLocaleDateString('pt-BR')
            };
            news.unshift(newPost); // Adiciona no início
            localStorage.setItem('noticias_locais', JSON.stringify(news));
            alert('Notícia publicada com sucesso!');
            this.reset();
        });

        // Lógica para Salvar Publicidade
        document.getElementById('formAd').addEventListener('submit', function(e) {
            e.preventDefault();
            const local = document.getElementById('ad-local').value;
            const img = document.getElementById('ad-img-url').value;
            localStorage.setItem(local, img);
            alert('Anúncio atualizado!');
            this.reset();
        });
    </script>
</body>
</html>
