<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noroeste Paranaense - Portal de Notícias</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

    <header style="background-color: #004a99; color: white; padding: 20px; text-align: center;">
        <h1>Noroeste Paranaense</h1>
        <p>Portal de notícias da região</p>
    </header>

    <nav style="background-color: #f4f4f4; padding: 10px;">
        <ul style="list-style: none; padding: 0;">
            <li style="padding: 10px; border-bottom: 1px solid #ddd;"><a href="#" style="text-decoration: none; color: #004a99; font-weight: bold;">Eventos</a></li>
            <li style="padding: 10px; border-bottom: 1px solid #ddd;"><a href="#" style="text-decoration: none; color: #004a99; font-weight: bold;">Notícias</a></li>
            <li style="padding: 10px; border-bottom: 1px solid #ddd;"><a href="#" style="text-decoration: none; color: #004a99; font-weight: bold;">Utilidade Pública</a></li>
            <li style="padding: 10px; border-bottom: 1px solid #ddd;"><a href="#" style="text-decoration: none; color: #004a99; font-weight: bold;">Vagas de Emprego</a></li>
            <li style="padding: 10px; border-bottom: 1px solid #ddd;"><a href="#" style="text-decoration: none; color: #004a99; font-weight: bold;">Serviços</a></li>
            <li style="padding: 10px; border-bottom: 1px solid #ddd;"><a href="#" style="text-decoration: none; color: #004a99; font-weight: bold;">Humor</a></li>
            <li style="padding: 10px; border-bottom: 1px solid #ddd;"><a href="#" style="text-decoration: none; color: #004a99; font-weight: bold;">Horóscopo</a></li>
            <li style="padding: 10px; border-bottom: 1px solid #ddd;"><a href="#" style="text-decoration: none; color: #004a99; font-weight: bold;">Resumo de Novelas</a></li>
        </ul>
    </nav>

    <main style="padding: 20px; text-align: center;">
        <h2>Publicidade</h2>
        <div style="background-color: #eef4ff; padding: 40px; border: 1px dashed #004a99;">
            Seu anúncio aqui
        </div>
    </main>

    <footer style="background-color: #004a99; color: white; text-align: center; padding: 20px; margin-top: 20px;">
        <p>Siga nas redes sociais</p>
        <div style="display: flex; justify-content: space-around;">
            <a href="#" style="color: white; text-decoration: none;">WhatsApp</a>
            <a href="#" style="color: white; text-decoration: none;">Facebook</a>
            <a href="#" style="color: white; text-decoration: none;">Instagram</a>
        </div>
    </footer>

    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
</body>
</html>
