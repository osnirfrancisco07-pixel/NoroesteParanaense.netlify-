<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noroeste Paranaense | Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <img src="posts/27317.jpg" alt="Logo" class="logo">
    </header>

    <nav class="main-nav">
        <div class="nav-top">
            <div class="menu-toggle" id="mobile-menu-btn">
                <i class="fas fa-bars"></i> MENU
            </div>
            <div class="search-container">
                <input type="text" placeholder="Pesquisar...">
                <button><i class="fas fa-search"></i></button>
            </div>
        </div>
        
        <div class="ticker-tv">
            <div class="ticker-track" id="ticker-values"></div>
        </div>

        <ul class="nav-links" id="nav-links">
            <li><a href="#noticias">NOTÍCIAS</a></li>
            <li><a href="#agro">AGRONEGÓCIO</a></li>
            <li><a href="#novelas">NOVELAS</a></li>
            <li><a href="#horoscopo">HORÓSCOPO</a></li>
            <li><a href="#clima">PREVISÃO DO TEMPO</a></li>
            <li><a href="https://wa.me/5544988329395" target="_blank">ANUNCIE CONOSCO</a></li>
        </ul>
    </nav>

    <main class="container">
        <section id="noticias" class="content-section">
            <h2 class="block-title">Notícias</h2>
            <div id="news-grid" class="standard-grid"></div>
        </section>

        <div class="market-split">
            <section id="agro" class="card-white">
                <h3 class="mini-title">Conversor de Moedas</h3>
                <input type="number" id="valorInput" placeholder="Valor em R$">
                <select id="moedaSelect">
                    <option value="USD">Dólar (USD)</option>
                    <option value="EUR">Euro (EUR)</option>
                </select>
                <button onclick="converterMoeda()" class="btn-calc">CONVERTER</button>
                <div id="resultadoCalc" class="res-box">Resultado: --</div>
            </section>

            <section id="horoscopo" class="card-white">
                <h3 class="mini-title">Horóscopo</h3>
                <select id="signoSelect" onchange="atualizarHoroscopo()" style="width:100%; padding:8px;">
                    <option value="Áries">Áries</option>
                    <option value="Touro">Touro</option>
                    <option value="Gêmeos">Gêmeos</option>
                </select>
                <div id="horoscopo-texto" class="res-box">Sua previsão aqui...</div>
            </section>
        </div>

        <section id="clima" class="content-section">
            <h2 class="block-title">Clima e Satélite</h2>
            <div class="card-white">
                <div id="relogio-digital" class="relogio"></div>
                <div id="map"></div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="social-icons">
            <a href="https://wa.me/5544988329395" target="_blank" title="WhatsApp"><i class="fab fa-whatsapp"></i></a>
            <a href="#" title="Facebook"><i class="fab fa-facebook"></i></a>
            <a href="#" title="Instagram"><i class="fab fa-instagram"></i></a>
        </div>
        <div class="footer-bottom">
            <p>© 2026 Noroeste Paranaense | Desenvolvido por [Seu Nome/Empresa]</p>
        </div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
